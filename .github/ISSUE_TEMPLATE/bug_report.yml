name: Bug report
description: Report a reproducible defect without including sensitive AI or credential data.
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Never include Provider/API keys, environment files, cookies, Authorization headers, prompts,
        model responses, raw Usage events, database dumps, or Connector spools. Report suspected
        vulnerabilities privately using SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag or commit SHA.
      placeholder: v0.2.0
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web
        - API
        - Worker or Scheduler
        - LiteLLM Connector
        - Node SDK
        - Python SDK
        - Database or migration
        - Docker or operations
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Sanitized reproduction
      description: Include exact steps and synthetic identifiers only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: Include privacy-safe error codes and request/event/job IDs when available.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed all credentials, prompts, responses, raw payloads, and customer identifiers.
          required: true
        - label: This is not a security vulnerability that should be reported privately.
          required: true
