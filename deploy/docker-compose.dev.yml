# Development-only override. Never use this file on an Internet-facing host.
services:
  postgres:
    ports:
      - "127.0.0.1:${DEV_POSTGRES_PORT:-5432}:5432"
  redis:
    ports:
      - "127.0.0.1:${DEV_REDIS_PORT:-6379}:6379"
  api:
    ports:
      - "127.0.0.1:${DEV_API_PORT:-4000}:4000"
  web:
    ports:
      - "127.0.0.1:${DEV_WEB_PORT:-3000}:3000"

networks:
  database:
    internal: false
  application:
    internal: false
