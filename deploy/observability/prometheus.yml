global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: tokenpilot-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: tokenpilot-worker
    metrics_path: /metrics
    dns_sd_configs:
      - names: ["worker"]
        type: A
        port: 9464
        refresh_interval: 5s

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
