groups:
  - name: tokenpilot
    rules:
      - alert: TokenPilotConnectorLost
        expr: ai_control_connector_stale{job="tokenpilot-api"} == 1 or ai_control_connector_last_heartbeat_age_seconds{job="tokenpilot-api"} > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: TokenPilot connector heartbeat is stale
          runbook: docs/operations.md

      - alert: TokenPilotConnectorMetricsMissing
        expr: absent(ai_control_connector_last_heartbeat_age_seconds{job="tokenpilot-api"}) and on() max(up{job="tokenpilot-api"}) == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: API is reachable but no Connector heartbeat metric is present
          runbook: docs/operations.md

      - alert: TokenPilotApiMetricsTargetMissing
        expr: absent(up{job="tokenpilot-api"}) or min by (job) (up{job="tokenpilot-api"}) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: API Prometheus scrape target is absent or down
          runbook: docs/operations.md

      - alert: TokenPilotWorkerMetricsTargetMissing
        expr: absent(up{job="tokenpilot-worker"}) or min by (job) (up{job="tokenpilot-worker"}) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Worker Prometheus scrape target is absent or down
          runbook: docs/operations.md

      - alert: TokenPilotPrometheusSelfTargetMissing
        expr: absent(up{job="prometheus"}) or min by (job) (up{job="prometheus"}) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Prometheus self-scrape target is absent or down
          runbook: docs/operations.md

      - alert: TokenPilotNodeExporterMetricsTargetMissing
        expr: absent(up{job="node-exporter"}) or min by (job) (up{job="node-exporter"}) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Node exporter Prometheus scrape target is absent or down
          runbook: docs/operations.md

      - alert: TokenPilotConnectorBacklogGrowing
        expr: ai_control_connector_backlog_alert{job="tokenpilot-api"} == 1 or deriv(ai_control_connector_buffer_depth{job="tokenpilot-api"}[15m]) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Connector durable spool backlog is above threshold or growing
          runbook: docs/operations.md

      - alert: TokenPilotUnpricedUsage
        expr: sum(increase(ai_control_provider_cost_unpriced_total{job="tokenpilot-worker"}[15m])) > 0 or sum(ai_control_provider_cost_unpriced_current{job="tokenpilot-api"}) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Usage is waiting for a valid Provider or Billable price
          runbook: docs/operations.md

      - alert: TokenPilotWorkerDLQNotEmpty
        expr: sum(ai_control_queue_failed_depth{job="tokenpilot-worker"}) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: At least one BullMQ queue retains terminal failures
          runbook: docs/operations.md

      - alert: TokenPilotRuntimeConfigurationAcknowledgementLag
        expr: max by (job, application_id, application_slug, connector_instance_id, connector_name) (ai_control_runtime_configuration_connector_acknowledgement_lag_current{job="tokenpilot-api"}) > 0 or ai_control_runtime_configuration_acknowledgements_absent_current{job="tokenpilot-api"} == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: A connector has not applied the latest published routing configuration
          runbook: docs/operations.md

      - alert: TokenPilotDatabaseConnectionsHigh
        expr: ai_control_db_connections{job="tokenpilot-api"} / clamp_min(ai_control_db_max_connections{job="tokenpilot-api"}, 1) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: PostgreSQL connection utilization exceeds 80 percent
          runbook: docs/operations.md

      - alert: TokenPilotDiskHighWatermark
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) > 0.85) and on(instance, device, mountpoint) node_filesystem_readonly == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: A Control Plane host filesystem exceeds 85 percent utilization
          runbook: docs/operations.md

      - alert: TokenPilotDailyCostGrowth
        expr: max(ai_control_daily_provider_cost{job="tokenpilot-api",period="current"}) > 1.5 * max(ai_control_daily_provider_cost{job="tokenpilot-api",period="previous"}) and max(ai_control_daily_provider_cost{job="tokenpilot-api",period="previous"}) > 10
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Current instance-local-day Provider cost is over 150 percent of the previous day
          runbook: docs/operations.md

      - alert: TokenPilotInboxOldestAge
        expr: max(ai_control_inbox_oldest_age_seconds{job="tokenpilot-api"}) > 60
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: The oldest incomplete Inbox event is over 60 seconds old
          runbook: docs/operations.md

      - alert: TokenPilotSettlementDLQIncreasing
        expr: sum(increase(ai_control_settlement_dlq_total{job="tokenpilot-worker"}[10m])) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Settlement is adding terminal failures to the DLQ
          runbook: docs/operations.md

      - alert: TokenPilotClickHouseDown
        expr: max(ai_control_clickhouse_health{job="tokenpilot-worker"}) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: ClickHouse health checks are failing
          runbook: docs/operations.md

      - alert: TokenPilotClickHouseSinkLag
        expr: max(ai_control_clickhouse_sink_lag_seconds) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ClickHouse projection lag exceeds 30 seconds
          runbook: docs/operations.md

      - alert: TokenPilotClickHouseInsertFailures
        expr: sum(increase(ai_control_clickhouse_insert_failures_total[10m])) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: ClickHouse inserts are failing
          runbook: docs/operations.md

      - alert: TokenPilotClickHouseStorageHigh
        expr: max(ai_control_clickhouse_storage_utilization_ratio) > 0.85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: ClickHouse storage utilization exceeds 85 percent
          runbook: docs/operations.md

      - alert: TokenPilotReconciliationConsecutiveFailures
        expr: sum(increase(ai_control_reconciliation_runs_total{status="failed"}[30m])) >= 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Three or more reconciliation runs failed in 30 minutes
          runbook: docs/operations.md

      - alert: TokenPilotProviderCostUnpricedRatio
        expr: sum(increase(ai_control_provider_cost_unpriced_total[15m])) / clamp_min(sum(increase(ai_control_settlement_events_total{stage="provider_cost"}[15m])), 1) > 0.01 and sum(increase(ai_control_settlement_events_total{stage="provider_cost"}[15m])) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Provider-cost unpriced ratio exceeds one percent
          runbook: docs/operations.md

      - alert: TokenPilotAiuUnratedRatio
        expr: sum(increase(ai_control_aiu_unrated_total[15m])) / clamp_min(sum(increase(ai_control_settlement_events_total{stage="aiu"}[15m])), 1) > 0.001 and sum(increase(ai_control_settlement_events_total{stage="aiu"}[15m])) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: AIU unrated ratio exceeds 0.1 percent
          runbook: docs/operations.md

      - alert: TokenPilotModelUnmapped
        expr: sum(increase(ai_control_model_unmapped_total[10m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Usage events cannot resolve a model
          runbook: docs/operations.md

      - alert: TokenPilotQuotaNegativeBalance
        expr: max(ai_control_quota_negative_balance_users) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: At least one quota balance is negative
          runbook: docs/operations.md

      - alert: TokenPilotReservationExpirySpike
        expr: sum(increase(ai_control_quota_reservation_expired_total[15m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: More than ten reservations expired in 15 minutes
          runbook: docs/operations.md

      - alert: TokenPilotRealtimeOfficialDelta
        expr: max(abs(ai_control_reconciliation_cost_delta)) > 1 or max(abs(ai_control_reconciliation_aiu_micro_delta)) > 1000000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Realtime and official cost or AIU projections exceed tolerance
          runbook: docs/operations.md
